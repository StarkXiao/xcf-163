<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>赛博渔港 - 机械残骸打捞</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="loading-screen">
      <div class="loading-content">
        <h1 class="neon-text">赛博渔港</h1>
        <p class="loading-text">资源加载中...</p>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p class="loading-percent" id="loading-percent">0%</p>
      </div>
    </div>

    <div id="game-ui" class="hidden">
      <div class="top-bar">
        <div class="stat-item">
          <span class="stat-label">能量</span>
          <span class="stat-value" id="energy-value">100</span>
          <span class="stat-sub">消耗: <span id="energy-cost">10</span></span>
        </div>
        <div class="stat-item">
          <span class="stat-label">金币</span>
          <span class="stat-value" id="coin-value">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">打捞次数</span>
          <span class="stat-value" id="catch-count">0</span>
        </div>
      </div>

      <div class="tide-panel" id="tide-panel">
        <div class="tide-header">
          <span class="tide-icon" id="tide-icon">🌙</span>
          <div class="tide-info">
            <span class="tide-name" id="tide-name">静海</span>
            <span class="tide-desc" id="tide-desc">海面平静，适合休息</span>
          </div>
          <span class="tide-time" id="tide-time">40s</span>
        </div>
        <div class="tide-progress-bar" id="tide-progress-bar">
          <div class="tide-progress-fill" id="tide-progress"></div>
        </div>
      </div>

      <div id="combo-display" class="combo-display hidden">
        <div class="combo-count" id="combo-count">0 COMBO</div>
        <div class="combo-multiplier" id="combo-multiplier"></div>
      </div>

      <div id="task-hint" class="task-hint hidden">
        <p id="task-text"></p>
        <button class="close-task" id="close-task">×</button>
      </div>

      <div class="bottom-bar">
        <button class="action-btn" id="btn-catch">
          <span class="btn-icon">🎣</span>
          <span class="btn-text">拖网</span>
        </button>
        <button class="action-btn" id="btn-backpack">
          <span class="btn-icon">🎒</span>
          <span class="btn-text">背包</span>
        </button>
        <button class="action-btn" id="btn-workshop">
          <span class="btn-icon">⚙️</span>
          <span class="btn-text">工坊</span>
        </button>
        <button class="action-btn" id="btn-collection">
          <span class="btn-icon">📖</span>
          <span class="btn-text">图鉴</span>
        </button>
        <button class="action-btn" id="btn-task">
          <span class="btn-icon">📋</span>
          <span class="btn-text">任务</span>
        </button>
        <button class="action-btn" id="btn-chamber">
          <span class="btn-icon">🏪</span>
          <span class="btn-text">商会</span>
        </button>
        <button class="action-btn" id="btn-expedition">
          <span class="btn-icon">🚢</span>
          <span class="btn-text">远征</span>
        </button>
        <button class="action-btn" id="btn-scrap-workshop">
          <span class="btn-icon">🔨</span>
          <span class="btn-text">残骸工坊</span>
        </button>
        <button class="action-btn" id="btn-tavern">
          <span class="btn-icon">🍺</span>
          <span class="btn-text">酒馆</span>
        </button>
        <button class="action-btn" id="btn-port-commission">
          <span class="btn-icon">⚓</span>
          <span class="btn-text">港口</span>
        </button>
      </div>
    </div>

    <div id="battle-modal" class="modal hidden">
      <div class="modal-content battle-content">
        <h2 class="modal-title" id="battle-title">发现机械残骸！</h2>
        <div class="creature-display" id="creature-display"></div>
        <p class="creature-quote" id="creature-quote"></p>
        <div class="battle-stats">
          <div class="stat-row">
            <span class="stat-name">名称</span>
            <span class="stat-data" id="creature-name"></span>
          </div>
          <div class="stat-row">
            <span class="stat-name">稀有度</span>
            <span class="stat-data" id="creature-rarity"></span>
          </div>
          <div class="stat-row">
            <span class="stat-name">价值</span>
            <span class="stat-data" id="creature-value"></span>
          </div>
        </div>
        <div class="battle-actions">
          <button class="modal-btn primary" id="btn-collect">收集</button>
          <button class="modal-btn secondary" id="btn-release">放生</button>
        </div>
      </div>
    </div>

    <div id="backpack-modal" class="modal hidden">
      <div class="modal-content">
        <h2 class="modal-title">背包</h2>
        <div class="inventory-grid" id="backpack-grid"></div>
        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-backpack">关闭</button>
        </div>
      </div>
    </div>

    <div id="collection-modal" class="modal hidden">
      <div class="modal-content">
        <h2 class="modal-title">图鉴</h2>
        <p class="collection-progress">收集进度: <span id="collection-progress">0/0</span></p>
        <div class="inventory-grid" id="collection-grid"></div>
        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-collection">关闭</button>
        </div>
      </div>
    </div>

    <div id="task-modal" class="modal hidden">
      <div class="modal-content">
        <h2 class="modal-title">任务列表</h2>
        <div class="task-list" id="task-list"></div>
        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-task">关闭</button>
        </div>
      </div>
    </div>

    <div id="item-detail-modal" class="modal hidden">
      <div class="modal-content">
        <h2 class="modal-title" id="detail-title">物品详情</h2>
        <div class="creature-display" id="detail-display"></div>
        <p class="creature-quote" id="detail-quote"></p>
        <div class="battle-stats">
          <div class="stat-row">
            <span class="stat-name">名称</span>
            <span class="stat-data" id="detail-name"></span>
          </div>
          <div class="stat-row">
            <span class="stat-name">稀有度</span>
            <span class="stat-data" id="detail-rarity"></span>
          </div>
          <div class="stat-row">
            <span class="stat-name">品阶</span>
            <span class="stat-data" id="detail-tier"></span>
          </div>
          <div class="stat-row">
            <span class="stat-name">描述</span>
            <span class="stat-data" id="detail-desc"></span>
          </div>
          <div class="stat-row" id="detail-affixes-row">
            <span class="stat-name">词条</span>
            <span class="stat-data" id="detail-affixes"></span>
          </div>
          <div class="stat-row">
            <span class="stat-name">数量</span>
            <span class="stat-data" id="detail-count"></span>
          </div>
        </div>
        <div class="modal-footer">
          <button class="modal-btn accent" id="btn-reinforce-item">⚙️ 强化</button>
          <button class="modal-btn primary" id="btn-sell-item">出售</button>
          <button class="modal-btn secondary" id="btn-close-detail">关闭</button>
        </div>
      </div>
    </div>

    <div id="workshop-modal" class="modal hidden">
      <div class="modal-content">
        <h2 class="modal-title">强化工坊</h2>
        <div class="materials-bar" id="workshop-materials"></div>
        <p class="workshop-hint">选择要强化的机械残骸</p>
        <div class="inventory-grid" id="reinforce-grid"></div>
        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-workshop">关闭</button>
        </div>
      </div>
    </div>

    <div id="reinforce-modal" class="modal hidden">
      <div class="modal-content reinforce-content">
        <h2 class="modal-title" id="reinforce-title">强化工坊</h2>
        <div class="creature-display" id="reinforce-display"></div>
        <div class="battle-stats">
          <div class="stat-row">
            <span class="stat-name">名称</span>
            <span class="stat-data" id="reinforce-name"></span>
          </div>
          <div class="stat-row">
            <span class="stat-name">稀有度</span>
            <span class="stat-data" id="reinforce-rarity"></span>
          </div>
          <div class="stat-row">
            <span class="stat-name">品阶</span>
            <span class="stat-data" id="reinforce-tier"></span>
          </div>
        </div>
        <div class="affix-list" id="reinforce-affixes"></div>
        <div class="reinforce-panels">
          <div class="reinforce-panel">
            <div id="reinforce-cost"></div>
            <button class="modal-btn primary full-width" id="btn-upgrade">升阶</button>
          </div>
          <div class="reinforce-panel">
            <div id="scrap-reward"></div>
            <button class="modal-btn danger full-width" id="btn-scrap">拆解</button>
          </div>
        </div>
        <div class="reinforce-reroll">
          <button class="modal-btn accent full-width" id="btn-reroll-affix">🔄 重铸词条</button>
        </div>
        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-reinforce">返回</button>
        </div>
      </div>
    </div>

    <div id="chamber-modal" class="modal hidden">
      <div class="modal-content chamber-content">
        <h2 class="modal-title">🏪 赛博渔港商会</h2>
        <div class="chamber-tabs">
          <button class="chamber-tab active" data-tab="overview">📊 总览</button>
          <button class="chamber-tab" data-tab="stalls">🏗️ 摊位</button>
          <button class="chamber-tab" data-tab="market">📈 市场</button>
          <button class="chamber-tab" data-tab="customer">🧑 顾客</button>
          <button class="chamber-tab" data-tab="orders">📋 订单</button>
          <button class="chamber-tab" data-tab="blackmarket">🌙 黑市</button>
          <button class="chamber-tab" data-tab="cycles">💾 周目</button>
        </div>

        <div class="chamber-tab-content" data-tab="overview" id="chamber-overview"></div>
        <div class="chamber-tab-content hidden" data-tab="stalls" id="chamber-stalls"></div>
        <div class="chamber-tab-content hidden" data-tab="market" id="chamber-market"></div>
        <div class="chamber-tab-content hidden" data-tab="customer" id="chamber-customer"></div>
        <div class="chamber-tab-content hidden" data-tab="orders" id="chamber-orders"></div>
        <div class="chamber-tab-content hidden" data-tab="blackmarket" id="chamber-blackmarket"></div>
        <div class="chamber-tab-content hidden" data-tab="cycles" id="chamber-cycles"></div>

        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-chamber">关闭</button>
        </div>
      </div>
    </div>

    <div id="expedition-modal" class="modal hidden">
      <div class="modal-content expedition-content">
        <h2 class="modal-title">🚢 深海远征</h2>
        <div class="chamber-tabs expedition-tabs">
          <button class="expedition-tab active" data-tab="overview">📊 总览</button>
          <button class="expedition-tab" data-tab="routes">🗺️ 航线</button>
          <button class="expedition-tab" data-tab="supplies">📦 补给</button>
          <button class="expedition-tab" data-tab="upgrades">⚙️ 升级</button>
          <button class="expedition-tab" data-tab="history">📜 历史</button>
        </div>

        <div class="chamber-tab-content expedition-tab-content" data-tab="overview" id="expedition-overview"></div>
        <div class="chamber-tab-content expedition-tab-content hidden" data-tab="routes" id="expedition-routes"></div>
        <div class="chamber-tab-content expedition-tab-content hidden" data-tab="supplies" id="expedition-supplies"></div>
        <div class="chamber-tab-content expedition-tab-content hidden" data-tab="upgrades" id="expedition-upgrades"></div>
        <div class="chamber-tab-content expedition-tab-content hidden" data-tab="history" id="expedition-history"></div>

        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-expedition">关闭</button>
        </div>
      </div>
    </div>

    <div id="expedition-settlement-modal" class="modal hidden">
      <div class="modal-content settlement-content" id="expedition-settlement-content"></div>
    </div>

    <div id="scrap-workshop-modal" class="modal hidden">
      <div class="modal-content scrap-workshop-content">
        <h2 class="modal-title">🔨 机械残骸工坊</h2>
        <div class="materials-bar" id="workshop-parts-bar"></div>

        <div class="chamber-tabs workshop-tabs">
          <button class="workshop-tab active" data-tab="disassemble">🔧 拆解</button>
          <button class="workshop-tab" data-tab="recipe">📜 配方</button>
          <button class="workshop-tab" data-tab="experiment">⚗️ 试验</button>
          <button class="workshop-tab" data-tab="catalog">🔍 图鉴反查</button>
          <button class="workshop-tab" data-tab="equipment">⚔️ 装备</button>
        </div>

        <div class="chamber-tab-content workshop-tab-content" data-tab="disassemble">
          <div class="workshop-two-col">
            <div class="workshop-col">
              <p class="workshop-hint">选择要拆解的机械残骸</p>
              <div class="inventory-grid" id="disassemble-grid"></div>
            </div>
            <div class="workshop-col">
              <div id="disassemble-detail"></div>
              <div class="modal-footer" style="padding:12px 0 0;">
                <button class="modal-btn danger full-width" id="btn-disassemble-confirm" disabled>🔧 拆解</button>
              </div>
            </div>
          </div>
        </div>

        <div class="chamber-tab-content workshop-tab-content hidden" data-tab="recipe">
          <div class="workshop-two-col">
            <div class="workshop-col">
              <p class="workshop-hint">已解锁配方列表</p>
              <div class="recipe-list" id="recipe-list"></div>
            </div>
            <div class="workshop-col">
              <div id="recipe-detail"></div>
              <div class="modal-footer" style="padding:12px 0 0;">
                <button class="modal-btn primary full-width" id="btn-craft-confirm" disabled>⚒️ 拼装</button>
              </div>
            </div>
          </div>
        </div>

        <div class="chamber-tab-content workshop-tab-content hidden" data-tab="experiment">
          <p class="workshop-hint">试验未知配方，点击试验槽取回零件</p>
          <div class="experiment-slots" id="experiment-slots"></div>
          <div class="experiment-result" id="experiment-result"></div>
          <div class="modal-footer">
            <button class="modal-btn secondary" id="btn-experiment-clear">清空</button>
            <button class="modal-btn accent" id="btn-experiment-confirm" disabled>⚗️ 开始试验</button>
          </div>
        </div>

        <div class="chamber-tab-content workshop-tab-content hidden" data-tab="catalog">
          <div class="catalog-search">
            <input type="text" id="catalog-search-input" placeholder="输入装备名或零件名反查..." class="catalog-input">
          </div>
          <div class="catalog-results" id="catalog-results"></div>
        </div>

        <div class="chamber-tab-content workshop-tab-content hidden" data-tab="equipment">
          <div class="workshop-two-col">
            <div class="workshop-col">
              <p class="workshop-hint">已拼装的装备</p>
              <div class="inventory-grid" id="equipment-grid"></div>
            </div>
            <div class="workshop-col">
              <div id="equipment-detail"></div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-scrap-workshop">关闭</button>
        </div>
      </div>
    </div>

    <div id="tavern-modal" class="modal hidden">
      <div class="modal-content tavern-content">
        <h2 class="modal-title">🍺 渔港酒馆 · 人脉系统</h2>
        <div class="chamber-tabs tavern-tabs">
          <button class="tavern-tab active" data-tab="characters">👥 角色人脉</button>
          <button class="tavern-tab" data-tab="intels">📡 情报</button>
          <button class="tavern-tab" data-tab="exchanges">🔄 材料交换</button>
          <button class="tavern-tab" data-tab="quests">📜 支线任务</button>
        </div>

        <div class="tavern-tab-content" data-tab="characters" id="tavern-characters"></div>
        <div class="tavern-tab-content hidden" data-tab="intels" id="tavern-intels"></div>
        <div class="tavern-tab-content hidden" data-tab="exchanges" id="tavern-exchanges"></div>
        <div class="tavern-tab-content hidden" data-tab="quests" id="tavern-quests"></div>

        <div class="modal-footer">
          <button class="modal-btn secondary" id="btn-close-tavern">关闭</button>
        </div>
      </div>
    </div>

    <div id="port-commission-modal" class="modal hidden">
      <div class="modal-content port-commission-content">
        <h2 class="modal-title">⚓ 港口委托 · 多阶段回收任务</h2>
        <div id="port-player-stats" class="port-player-stats"></div>
        <div class="chamber-tabs port-tabs">
          <button class="port-tab active" data-tab="active">📋 进行中</button>
          <button class="port-tab" data-tab="available">📌 可接委托</button>
          <button class="port-tab" data-tab="history">📜 历史记录</button>
        </div>

        <div class="port-tab-content" data-tab="active" id="port-active-commissions"></div>
        <div class="port-tab-content hidden" data-tab="available" id="port-available-commissions"></div>
        <div class="port-tab-content hidden" data-tab="history" id="port-commission-history"></div>

        <div class="modal-footer">
          <button class="modal-btn accent" id="btn-port-refresh" data-port-refresh="all">🔄 刷新委托</button>
          <button class="modal-btn secondary" id="btn-close-port-commission">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
